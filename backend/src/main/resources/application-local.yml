spring:
  datasource:
    url: jdbc:mysql://localhost:3306/odinsync_local?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: odinsync_local
    password: change-me-locally
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    com.odinsync: DEBUG