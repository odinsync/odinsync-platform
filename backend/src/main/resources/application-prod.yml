spring:
  datasource:
    url: ${ODINSYNC_DATASOURCE_URL}
    username: ${ODINSYNC_DATASOURCE_USERNAME}
    password: ${ODINSYNC_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    root: INFO
    com.odinsync: INFO
