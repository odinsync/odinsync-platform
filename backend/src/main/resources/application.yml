spring:

  application:
    name: odinsync-platform

logging:
  level:
    root: INFO
    com.odinsync: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info

odinsync:
  security:
    jwt:
      issuer: odinsync-platform
      access-token-ttl: 15m
      generate-development-keys: false
    refresh-token:
      ttl: 30d
      token-size-bytes: 64
      retention-period: 90d
      lock-timeout: 3s
      max-generation-attempts: 3
